version: 2

updates:
  # 프론트엔드 npm 의존성
  - package-ecosystem: "npm"
    directory: "/frontend"

    schedule:
      interval: "monthly"

    # 동시에 열려 있을 수 있는 Dependabot PR 수
    open-pull-requests-limit: 1

    groups:
      frontend-dependencies:
        patterns:
          - "*"

  # 백엔드 Python 의존성
  - package-ecosystem: "pip"
    directory: "/backend"

    schedule:
      interval: "monthly"

    open-pull-requests-limit: 1

    groups:
      backend-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "monthly"

    open-pull-requests-limit: 1

    groups:
      github-actions:
        patterns:
          - "*"