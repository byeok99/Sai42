services:
  - type: web
    name: sai42-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -m alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./data/sai42.db"
