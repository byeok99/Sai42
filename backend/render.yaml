services:
  - type: web
    name: sai42-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    healthCheckPath: /api/v1/health
    startCommand: >-
      python -m alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./data/sai42.db"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SQLITE_BUSY_TIMEOUT_MS
        value: "5000"
      - key: AUTH_RATE_LIMIT_MAX_ATTEMPTS
        value: "10"
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_MAX_RETRIES
        value: "0"
      - key: OPENAI_CANDIDATE_LIMIT
        value: "24"
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: OPENAI_PROMPT_CACHE_KEY
        value: sai42-chat-v1
